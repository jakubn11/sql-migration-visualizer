<svg width="1200" height="912" viewBox="0 0 1200 912" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SQL Migration Visualizer features</title>
  <desc id="desc">A polished feature board for SQL Migration Visualizer showing Timeline View, Schema Diff, ER Diagram, Validation, Suggested Migrations, and Dialect Support in the plugin's blue and cyan palette.</desc>
  <defs>
    <linearGradient id="pageBg" x1="98" y1="40" x2="1114" y2="912" gradientUnits="userSpaceOnUse">
      <stop stop-color="#131821"/>
      <stop offset="1" stop-color="#1B222D"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="120" x2="1010" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58D1C9"/>
      <stop offset="0.58" stop-color="#6AA6FF"/>
      <stop offset="1" stop-color="#8ABBFF"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="138" y1="248" x2="1096" y2="864" gradientUnits="userSpaceOnUse">
      <stop stop-color="#202734"/>
      <stop offset="1" stop-color="#1B2230"/>
    </linearGradient>
    <linearGradient id="cardInset" x1="72" y1="248" x2="72" y2="412" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(204 126) rotate(41) scale(380 280)">
      <stop stop-color="#58D1C9" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#58D1C9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 98) rotate(135) scale(430 320)">
      <stop stop-color="#6AA6FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6AA6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#26303D" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#03080F" flood-opacity="0.28"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="20" y="20" width="1160" height="872" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect x="20" y="20" width="1160" height="872" rx="34" fill="url(#pageBg)"/>
    <rect x="20" y="20" width="1160" height="872" rx="34" fill="url(#grid)" opacity="0.22"/>
    <circle cx="208" cy="126" r="300" fill="url(#glowA)"/>
    <circle cx="1040" cy="98" r="340" fill="url(#glowB)"/>
    <rect x="20" y="20" width="1160" height="872" rx="34" stroke="#334050"/>
  </g>

  <rect x="72" y="56" width="194" height="38" rx="19" fill="#58D1C91A" stroke="#58D1C94D"/>
  <text x="169" y="80" text-anchor="middle" fill="#58D1C9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">FEATURE OVERVIEW</text>
  <rect x="72" y="108" width="205" height="10" rx="5" fill="url(#accent)"/>
  <text x="72" y="186" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="800">What You Get</text>
  <text x="72" y="224" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">A cleaner way to follow schema history, compare versions,</text>
  <text x="72" y="252" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">validate changes, and draft the next migration.</text>

  <g>
    <rect x="854" y="60" width="264" height="144" rx="24" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="854" y="60" width="264" height="144" rx="24" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="855.5" y="61.5" width="261" height="141" rx="22.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <text x="884" y="86" fill="#8793A9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">WORKFLOW</text>
    <circle cx="893" cy="117" r="9" fill="#58D1C9"/>
    <text x="920" y="117" dominant-baseline="middle" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Inside the IDE</text>
    <circle cx="893" cy="151" r="9" fill="#6AA6FF"/>
    <text x="920" y="151" dominant-baseline="middle" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Visual by default</text>
    <circle cx="893" cy="185" r="9" fill="#8ABBFF"/>
    <text x="920" y="185" dominant-baseline="middle" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">Built for migrations</text>
  </g>

  <g>
    <rect x="72" y="288" width="504" height="168" rx="26" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="72" y="288" width="504" height="168" rx="26" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="73.5" y="289.5" width="501" height="165" rx="24.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <rect x="102" y="340" width="64" height="64" rx="20" fill="#58D1C918" stroke="#58D1C940"/>
    <path d="M120 384L132 368L143 377L156 356" stroke="#58D1C9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="120" cy="384" r="4" fill="#58D1C9"/>
    <circle cx="132" cy="368" r="4" fill="#58D1C9"/>
    <circle cx="143" cy="377" r="4" fill="#58D1C9"/>
    <circle cx="156" cy="356" r="4" fill="#58D1C9"/>
    <text x="186" y="332" dominant-baseline="hanging" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Timeline View</text>
    <text x="186" y="368" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Browse schema history version by version</text>
    <text x="186" y="392" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">with change summaries, table counts, and</text>
    <text x="186" y="416" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">source-aware navigation.</text>
  </g>

  <g>
    <rect x="624" y="288" width="504" height="168" rx="26" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="624" y="288" width="504" height="168" rx="26" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="625.5" y="289.5" width="501" height="165" rx="24.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <rect x="654" y="340" width="64" height="64" rx="20" fill="#6AA6FF18" stroke="#6AA6FF40"/>
    <rect x="670" y="356" width="14" height="14" rx="4" stroke="#8ABBFF" stroke-width="3"/>
    <rect x="689" y="375" width="14" height="14" rx="4" stroke="#8ABBFF" stroke-width="3"/>
    <path d="M684 363H691M677 370V377" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <text x="738" y="332" dominant-baseline="hanging" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Schema Diff</text>
    <text x="738" y="368" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Compare two versions to spot added, removed,</text>
    <text x="738" y="392" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">renamed, and changed tables or columns quickly.</text>
  </g>

  <g>
    <rect x="72" y="480" width="504" height="168" rx="26" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="72" y="480" width="504" height="168" rx="26" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="73.5" y="481.5" width="501" height="165" rx="24.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <rect x="102" y="532" width="64" height="64" rx="20" fill="#58D1C918" stroke="#58D1C940"/>
    <rect x="117" y="547" width="13" height="13" rx="4" stroke="#58D1C9" stroke-width="3"/>
    <rect x="139" y="547" width="13" height="13" rx="4" stroke="#58D1C9" stroke-width="3"/>
    <rect x="128" y="569" width="13" height="13" rx="4" stroke="#58D1C9" stroke-width="3"/>
    <path d="M130 553H139M145 560V569M123 560V569" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <text x="186" y="524" dominant-baseline="hanging" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">ER Diagram</text>
    <text x="186" y="560" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Inspect table relationships visually with</text>
    <text x="186" y="584" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">zoomable, draggable table cards.</text>
  </g>

  <g>
    <rect x="624" y="480" width="504" height="168" rx="26" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="624" y="480" width="504" height="168" rx="26" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="625.5" y="481.5" width="501" height="165" rx="24.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <rect x="654" y="532" width="64" height="64" rx="20" fill="#F5C46B16" stroke="#F5C46B38"/>
    <path d="M686 549L701 557V570C701 577 694 583 686 586C678 583 671 577 671 570V557L686 549Z" stroke="#F5C46B" stroke-width="3" stroke-linejoin="round"/>
    <path d="M680 568L685 573L693 564" stroke="#F5C46B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="738" y="524" dominant-baseline="hanging" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Validation</text>
    <text x="738" y="560" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Catch gaps, duplicates, invalid alters, and</text>
    <text x="738" y="584" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">inconsistent migration history before it causes damage.</text>
  </g>

  <g>
    <rect x="72" y="672" width="504" height="168" rx="26" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="72" y="672" width="504" height="168" rx="26" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="73.5" y="673.5" width="501" height="165" rx="24.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <rect x="102" y="724" width="64" height="64" rx="20" fill="#6AA6FF18" stroke="#6AA6FF40"/>
    <path d="M119 755H148" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M119 742H138" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M119 768H141" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M140 741L149 750L140 759" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="186" y="716" dominant-baseline="hanging" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Suggested Migrations</text>
    <text x="186" y="752" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Detect saved schema changes and prepare</text>
    <text x="186" y="776" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">a draft migration for review when you are ready.</text>
  </g>

  <g>
    <rect x="624" y="672" width="504" height="168" rx="26" fill="#1B2230" opacity="0.01" filter="url(#shadow)"/>
    <rect x="624" y="672" width="504" height="168" rx="26" fill="url(#cardBg)" stroke="#334050"/>
    <rect x="625.5" y="673.5" width="501" height="165" rx="24.5" stroke="#FFFFFF" stroke-opacity="0.04"/>
    <rect x="654" y="724" width="64" height="64" rx="20" fill="#58D1C918" stroke="#58D1C940"/>
    <path d="M674 747H699" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <path d="M674 759H687" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <path d="M689 759H700" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <path d="M674 771H693" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="704" cy="759" r="8" stroke="#58D1C9" stroke-width="3"/>
    <text x="738" y="716" dominant-baseline="hanging" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Dialect Support</text>
    <text x="738" y="752" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Generate SQL for Generic SQL, PostgreSQL,</text>
    <text x="738" y="776" dominant-baseline="hanging" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">and MySQL or MariaDB workflows.</text>
  </g>
</svg>
