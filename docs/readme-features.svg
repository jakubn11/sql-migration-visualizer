<svg width="1200" height="860" viewBox="0 0 1200 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SQL Migration Visualizer features</title>
  <desc id="desc">A polished feature board for SQL Migration Visualizer showing Timeline View, Schema Diff, ER Diagram, Validation, Suggested Migrations, and Dialect Support in the plugin's blue and cyan palette.</desc>
  <defs>
    <linearGradient id="pageBg" x1="98" y1="40" x2="1114" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#131821"/>
      <stop offset="1" stop-color="#1B222D"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="120" x2="1010" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58D1C9"/>
      <stop offset="0.58" stop-color="#6AA6FF"/>
      <stop offset="1" stop-color="#8ABBFF"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(204 126) rotate(41) scale(380 280)">
      <stop stop-color="#58D1C9" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#58D1C9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 98) rotate(135) scale(430 320)">
      <stop stop-color="#6AA6FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6AA6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#26303D" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#03080F" flood-opacity="0.3"/>
    </filter>
    <clipPath id="frameClip">
      <rect x="20" y="20" width="1160" height="820" rx="34"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect x="20" y="20" width="1160" height="820" rx="34" fill="url(#pageBg)"/>
    <rect x="20" y="20" width="1160" height="820" rx="34" fill="url(#grid)" opacity="0.22"/>
    <circle cx="208" cy="126" r="300" fill="url(#glowA)"/>
    <circle cx="1040" cy="98" r="340" fill="url(#glowB)"/>
    <rect x="20" y="20" width="1160" height="820" rx="34" stroke="#334050"/>
  </g>

  <rect x="72" y="56" width="194" height="38" rx="19" fill="#58D1C91A" stroke="#58D1C94D"/>
  <text x="169" y="80" text-anchor="middle" fill="#58D1C9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="0.08em">FEATURE OVERVIEW</text>
  <rect x="72" y="108" width="205" height="10" rx="5" fill="url(#accent)"/>
  <text x="72" y="186" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="800">What You Get</text>
  <text x="72" y="228" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">A cleaner way to follow schema history, compare versions, validate changes, and draft the next migration.</text>

  <g filter="url(#shadow)">
    <rect x="854" y="60" width="264" height="144" rx="24" fill="#1B222D" stroke="#334050"/>
    <text x="884" y="92" fill="#8793A9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="0.08em">WORKFLOW</text>
    <rect x="884" y="111" width="14" height="14" rx="7" fill="#58D1C9"/>
    <text x="914" y="124" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Inside the IDE</text>
    <rect x="884" y="144" width="14" height="14" rx="7" fill="#6AA6FF"/>
    <text x="914" y="157" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Visual by default</text>
    <rect x="884" y="177" width="14" height="14" rx="7" fill="#8ABBFF"/>
    <text x="914" y="190" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Built for migrations</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="248" width="504" height="164" rx="26" fill="#1B222D" stroke="#334050"/>
    <rect x="72" y="248" width="504" height="6" rx="3" fill="url(#accent)"/>
    <rect x="102" y="279" width="58" height="58" rx="18" fill="#58D1C918" stroke="#58D1C940"/>
    <path d="M118 319L129 304L139 312L151 293" stroke="#58D1C9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="118" cy="319" r="4" fill="#58D1C9"/>
    <circle cx="129" cy="304" r="4" fill="#58D1C9"/>
    <circle cx="139" cy="312" r="4" fill="#58D1C9"/>
    <circle cx="151" cy="293" r="4" fill="#58D1C9"/>
    <text x="182" y="305" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Timeline View</text>
    <text x="182" y="339" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Browse schema history version by version with</text>
    <text x="182" y="366" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">change summaries, table counts, and source-aware navigation.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="624" y="248" width="504" height="164" rx="26" fill="#1B222D" stroke="#334050"/>
    <rect x="624" y="248" width="504" height="6" rx="3" fill="url(#accent)"/>
    <rect x="654" y="279" width="58" height="58" rx="18" fill="#6AA6FF18" stroke="#6AA6FF40"/>
    <rect x="669" y="293" width="13" height="13" rx="3" stroke="#8ABBFF" stroke-width="3"/>
    <rect x="686" y="310" width="13" height="13" rx="3" stroke="#8ABBFF" stroke-width="3"/>
    <path d="M682 299H688M675 306V312" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <text x="734" y="305" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Schema Diff</text>
    <text x="734" y="339" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Compare two versions to spot added, removed,</text>
    <text x="734" y="366" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">renamed, and changed tables or columns quickly.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="442" width="504" height="164" rx="26" fill="#1B222D" stroke="#334050"/>
    <rect x="72" y="442" width="504" height="6" rx="3" fill="url(#accent)"/>
    <rect x="102" y="473" width="58" height="58" rx="18" fill="#58D1C918" stroke="#58D1C940"/>
    <rect x="115" y="486" width="12" height="12" rx="3" stroke="#58D1C9" stroke-width="3"/>
    <rect x="136" y="486" width="12" height="12" rx="3" stroke="#58D1C9" stroke-width="3"/>
    <rect x="126" y="507" width="12" height="12" rx="3" stroke="#58D1C9" stroke-width="3"/>
    <path d="M127 492H136M142 498V507M121 498V507" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <text x="182" y="499" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">ER Diagram</text>
    <text x="182" y="533" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Inspect table relationships visually with</text>
    <text x="182" y="560" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">zoomable, draggable table cards.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="624" y="442" width="504" height="164" rx="26" fill="#1B222D" stroke="#334050"/>
    <rect x="624" y="442" width="504" height="6" rx="3" fill="url(#accent)"/>
    <rect x="654" y="473" width="58" height="58" rx="18" fill="#F5C46B16" stroke="#F5C46B38"/>
    <path d="M683 489L697 497V509C697 515 691 520 683 523C675 520 669 515 669 509V497L683 489Z" stroke="#F5C46B" stroke-width="3" stroke-linejoin="round"/>
    <path d="M678 507L682 511L689 503" stroke="#F5C46B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="734" y="499" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Validation</text>
    <text x="734" y="533" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Catch gaps, duplicates, invalid alters, and</text>
    <text x="734" y="560" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">inconsistent migration history before it causes damage.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="636" width="504" height="164" rx="26" fill="#1B222D" stroke="#334050"/>
    <rect x="72" y="636" width="504" height="6" rx="3" fill="url(#accent)"/>
    <rect x="102" y="667" width="58" height="58" rx="18" fill="#6AA6FF18" stroke="#6AA6FF40"/>
    <path d="M117 696H144" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M117 686H134" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M117 706H137" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M137 685L145 693L137 701" stroke="#8ABBFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="182" y="693" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Suggested Migrations</text>
    <text x="182" y="727" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Detect saved schema changes and prepare a</text>
    <text x="182" y="754" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">draft migration for review when you are ready.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="624" y="636" width="504" height="164" rx="26" fill="#1B222D" stroke="#334050"/>
    <rect x="624" y="636" width="504" height="6" rx="3" fill="url(#accent)"/>
    <rect x="654" y="667" width="58" height="58" rx="18" fill="#58D1C918" stroke="#58D1C940"/>
    <path d="M672 689H695" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <path d="M672 701H684" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <path d="M686 701H696" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <path d="M672 713H690" stroke="#58D1C9" stroke-width="3" stroke-linecap="round"/>
    <circle cx="699" cy="701" r="7" stroke="#58D1C9" stroke-width="3"/>
    <text x="734" y="693" fill="#EEF4FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Dialect Support</text>
    <text x="734" y="727" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Generate SQL for Generic SQL, PostgreSQL,</text>
    <text x="734" y="754" fill="#C4CEE0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">and MySQL or MariaDB workflows.</text>
  </g>
</svg>
